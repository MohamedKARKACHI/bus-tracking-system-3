spring.application.name=backend

# Server Configuration
server.port=4000
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:8889/bus_tracking_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=your-secret-key-change-this-to-a-secure-256-bit-key
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.bus.backend=DEBUG
